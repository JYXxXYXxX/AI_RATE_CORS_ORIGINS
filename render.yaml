# Render Blueprint（基础设施即代码）
# 使用方式：
# 1. 先将代码推送到 GitHub
# 2. 在 Render Dashboard 点击 "New +" → "Blueprint"
# 3. 选择你的 GitHub 仓库，Render 会自动读取此文件并创建服务
# 4. 创建完成后，在环境变量里手动填入 AI_RATE_DATABASE_URL（来自 Supabase）

services:
  - type: web
    name: ai-rate-detector
    runtime: docker
    repo: https://github.com/JYXxXYXxX/AI_RATE_CORS_ORIGINS.git
    branch: main
    plan: free
    envVars:
      - key: AI_RATE_SERVICE_ENV
        value: prod
      - key: AI_RATE_CORS_ORIGINS
        value: https://ai-rate-detector.onrender.com  # ← 如果你改了服务名，这里也要改
      - key: AI_RATE_PAYMENT_PUBLIC_BASE_URL
        value: https://ai-rate-detector.onrender.com
      - key: AI_RATE_COOKIE_SECURE
        value: "true"
      - key: AI_RATE_COOKIE_SAMESITE
        value: none
      - key: AI_RATE_DATABASE_URL
        sync: false  # 在 Supabase 创建后，到 Render Dashboard 手动填入
      - key: AI_RATE_PAYMENT_CALLBACK_SECRET
        generateValue: true
      - key: AI_RATE_LLM_PROVIDER
        value: none
      - key: AI_RATE_ASYNC_QUEUE_BACKEND
        value: local
    healthCheckPath: /health

  # 如果未来切换到 Celery，需要：
  # 1. 在 Render Dashboard 添加一个 Redis 实例（或 Upstash Redis）
  # 2. 把上面的 AI_RATE_ASYNC_QUEUE_BACKEND 改成 celery
  # 3. 添加 AI_RATE_CELERY_BROKER_URL 环境变量
  # 4. 取消注释下面的 worker 服务
  # - type: worker
  #   name: ai-rate-detector-worker
  #   runtime: docker
  #   repo: https://github.com/JYXxXYXxX/AI_RATE_CORS_ORIGINS.git
  #   branch: main
  #   plan: free
  #   envVars:
  #     - key: AI_RATE_SERVICE_ENV
  #       value: prod
  #     - key: AI_RATE_DATABASE_URL
  #       sync: false
  #     - key: AI_RATE_ASYNC_QUEUE_BACKEND
  #       value: celery
  #     - key: AI_RATE_CELERY_BROKER_URL
  #       sync: false
  #   startCommand: celery -A app.worker.celery_app worker --loglevel=INFO --queues=analysis --concurrency=2
