version: "3.9"

services:
  # PostgreSQL + pgvector
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-paper_risk_platform}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # Redis (Celery 后端，可选)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  onlyoffice:
    image: onlyoffice/documentserver:latest
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${AI_RATE_ONLYOFFICE_JWT_SECRET:-dev-onlyoffice-jwt-secret}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # 后端 API + 前端静态文件
  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AI_RATE_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/${POSTGRES_DB:-paper_risk_platform}
      AI_RATE_ASYNC_QUEUE_BACKEND: celery
      AI_RATE_CELERY_BROKER_URL: redis://redis:6379/0
      AI_RATE_CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 生产环境建议：使用 gunicorn + uvicorn worker，并限制 worker 数量
    command: uvicorn app.main:app --host 0.0.0.0 --port 8010 --workers 4
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8010/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    # 生产环境建议以非 root 用户运行（需在 Dockerfile 中创建 app 用户）
    # user: "1000:1000"

  # 后台分析 Worker：生产环境不要让 API 进程直接执行长任务
  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AI_RATE_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/${POSTGRES_DB:-paper_risk_platform}
      AI_RATE_ASYNC_QUEUE_BACKEND: celery
      AI_RATE_CELERY_BROKER_URL: redis://redis:6379/0
      AI_RATE_CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --loglevel=INFO --queues=analysis --concurrency=2
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # 前端构建产物（生产环境挂载）
      - ./frontend/dist:/usr/share/nginx/html:ro
      # HTTPS 证书（生产环境取消注释）
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

volumes:
  pgdata:
