name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check app/ tests/ scripts/
      - name: Format check
        run: ruff format --check app/ tests/ scripts/

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: paper_risk_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff
      - name: Initialize database
        run: |
          for f in sql/migrations/*.sql; do
            PGPASSWORD=postgres psql -h localhost -U postgres -d paper_risk_platform -f "$f"
          done
        env:
          AI_RATE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/paper_risk_platform
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        env:
          AI_RATE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/paper_risk_platform
